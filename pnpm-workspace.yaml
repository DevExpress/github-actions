packages:
  - common
  - get-changed-files
  - pr-filter
  - send-teams-notification
  - validate-sbom
  - verify-version-change

allowBuilds:
  unrs-resolver: true

catalog:
  '@actions/core': 2.0.3
  '@actions/exec': 2.0.0
  '@actions/github': 8.0.1
  '@types/jest': ^30.0.0
  '@types/node': ^24.13.2
  '@vercel/ncc': ^0.38.4
  rimraf: ^6.1.3
  ts-jest: ^29.4.11
  typescript: ^5.9.3

minimumReleaseAgeExclude:
  - form-data@4.0.6
  - js-yaml@4.1.2

overrides:
  js-yaml@<=4.1.1: ^4.1.2
